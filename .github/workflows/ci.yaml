name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Use the same Rust toolchain across jobs so they can share a cache.
  # Keep this in sync with https://github.com/TheBevyFlock/bevy_cli/blob/main/rust-toolchain.toml
  toolchain: nightly-2026-03-05

jobs:
  # Run tests.
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: |
          echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-directories: ${{ env.LD_LIBRARY_PATH }}

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install nextest
        run: cargo binstall cargo-nextest --locked --force

      - name: Run tests
        run: cargo nextest run --locked --workspace --lib --bins --tests --no-fail-fast --no-tests warn

      - name: Run doctests
        run: cargo test --locked --workspace --doc

  # Windows dylib experiment. Builds the editor with the `dylib`
  # feature engaged (so the SDK proxy + jackdaw_dylib + bevy_dylib
  # chain is active), then dumps the export count for each DLL in
  # the chain so we can see what the actual PE 65,535 cap pressure
  # looks like. Designed to surface diagnostics even on failure;
  # does not block other jobs.
  windows-dylib-diag:
    name: Windows dylib diagnostic
    runs-on: windows-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.toolchain }}

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: windows-dylib-diag

      - name: Build editor with dylib feature
        # Builds the workspace with `--features dylib`, which pulls
        # in `jackdaw_sdk` and turns on `jackdaw_api/dynamic_linking`
        # (which transitively enables `bevy/dynamic_linking`). The
        # full SDK proxy + jackdaw_dylib + bevy_dylib chain is
        # exercised. We don't `--locked` the build because the
        # cancel-aware/dylib path may pull in deps not yet in
        # Cargo.lock.
        shell: bash
        run: |
          set -euxo pipefail
          cargo build -p jackdaw --features dylib 2>&1 | tee build.log
        continue-on-error: true

      - name: Surface build log on failure
        if: always()
        shell: bash
        run: |
          if [[ -f build.log ]]; then
            echo "===== last 100 lines of build.log ====="
            tail -100 build.log
          fi

      - name: Dump exported symbol counts per DLL
        # Uses `llvm-readobj --coff-exports` from the Rust toolchain's
        # llvm-tools-preview component (no VS env init needed). Counts
        # `Symbol {` blocks. Earlier attempt with `dumpbin` failed
        # because dumpbin needs `vcvarsall.bat`-style VS env init and
        # isn't on the bare bash PATH.
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          rustup component add llvm-tools-preview || true
          # llvm-readobj lives under the rustc sysroot's llvm-tools.
          rustlib=$(rustc --print sysroot)/lib/rustlib/x86_64-pc-windows-msvc/bin
          export PATH="$rustlib:$PATH"
          if ! command -v llvm-readobj >/dev/null; then
            echo "llvm-readobj not on PATH after sysroot extension — skipping symbol count"
            exit 0
          fi
          dlls=(
            target/debug/jackdaw_sdk.dll
            target/debug/jackdaw_dylib.dll
            target/debug/deps/jackdaw_sdk*.dll
            target/debug/deps/jackdaw_dylib*.dll
            target/debug/deps/bevy_dylib*.dll
            tests/fixtures/test_fixture_extension/target/debug/deps/test_fixture_extension*.dll
            target/debug/deps/test_fixture_extension*.dll
          )
          for dll in "${dlls[@]}"; do
            if [[ -f "$dll" ]]; then
              echo "===== $dll ====="
              ls -l "$dll"
              count=$(llvm-readobj --coff-exports "$dll" 2>/dev/null | grep -c '^  Symbol {' || true)
              echo "exported symbols: $count (cap is 65535)"
              echo
            fi
          done

      - name: Build test fixture cdylib WITHOUT wrapper
        # Vanilla `cargo build` on the test fixture; no jackdaw rustc
        # wrapper, no `--features dylib` on the fixture (it has no
        # such feature). This is the build path a user would take if
        # they invoked `cargo build` directly on their game cdylib
        # without going through jackdaw's editor flow. Likely to
        # exceed the export cap because the cdylib statically embeds
        # bevy. Captured deliberately so we can see the failure.
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --manifest-path tests/fixtures/test_fixture_extension/Cargo.toml 2>&1 | tee fixture-naive.log
        continue-on-error: true

      - name: Surface naive fixture log
        if: always()
        shell: bash
        run: |
          if [[ -f fixture-naive.log ]]; then
            echo "===== last 100 lines of fixture-naive.log ====="
            tail -100 fixture-naive.log
          fi

      - name: Build test fixture cdylib WITH wrapper (mirrors editor flow)
        # Mirrors what `build_extension_project_with_progress` does in
        # the editor: enables the dylib path on the workspace, sets
        # RUSTC_WRAPPER + JACKDAW_SDK_DYLIB + JACKDAW_SDK_DEPS, runs
        # `cargo build` on the fixture's manifest. The wrapper
        # rewrites `--extern bevy=...` to point at libjackdaw_sdk.dll
        # so the cdylib doesn't statically embed bevy.
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          # Build the rustc wrapper binary first.
          cargo build -p jackdaw_rustc_wrapper 2>&1 | tail -20
          wrapper="$PWD/target/debug/jackdaw-rustc-wrapper.exe"
          sdk_dll="$PWD/target/debug/jackdaw_sdk.dll"
          sdk_deps="$PWD/target/debug/deps"
          ls -l "$wrapper" "$sdk_dll" || true
          RUSTC_WRAPPER="$wrapper" \
          JACKDAW_SDK_DYLIB="$sdk_dll" \
          JACKDAW_SDK_DEPS="$sdk_deps" \
          cargo build --manifest-path tests/fixtures/test_fixture_extension/Cargo.toml 2>&1 | tee fixture-wrapped.log
        continue-on-error: true

      - name: Surface wrapped fixture log
        if: always()
        shell: bash
        run: |
          if [[ -f fixture-wrapped.log ]]; then
            echo "===== last 100 lines of fixture-wrapped.log ====="
            tail -100 fixture-wrapped.log
          fi

      - name: Run dylib loader smoke test
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          cargo test --features dylib --package jackdaw --test dylib_loading 2>&1 | tee smoke.log
        continue-on-error: true

      - name: Surface smoke test log
        if: always()
        shell: bash
        run: |
          if [[ -f smoke.log ]]; then
            echo "===== last 100 lines of smoke.log ====="
            tail -100 smoke.log
          fi


  # Scaffold each shipping template via `cargo generate` and run
  # `cargo check` to catch template regressions: missing/renamed
  # deps, stale API usage in main.rs/lib.rs, broken Cargo.toml
  # syntax, etc. Modeled after bevy_new_2d's template CI: one job
  # per template via matrix so each template gets its own CI line
  # and failures don't cascade. The scaffolded project's `jackdaw`
  # and `jackdaw_runtime` deps are patched to point at the
  # workspace checkout under test so we exercise THIS PR's runtime
  # against THIS PR's templates instead of whatever happens to be
  # on `main`.
  templates:
    name: Template - ${{ matrix.template }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template:
          - game-static
          - extension-static
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install cargo-generate
        run: cargo binstall cargo-generate --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: template-${{ matrix.template }}

      - name: Scaffold ${{ matrix.template }}
        env:
          # Suppress cargo-generate's interactive author prompt; the
          # scaffolder fills `authors` from this env in CI.
          CARGO_GENERATE_VALUE_AUTHORS: "ci@jackdaw"
        run: |
          set -euxo pipefail
          checkout="$GITHUB_WORKSPACE"
          template="${{ matrix.template }}"
          name="test_$(echo "$template" | tr - _)"
          rm -rf "$RUNNER_TEMP/$name"
          cargo generate \
            --path "$checkout/templates/$template" \
            --name "$name" \
            --destination "$RUNNER_TEMP" \
            --silent
          # Pin the scaffolded project's `jackdaw` / `jackdaw_runtime`
          # deps to THIS checkout so we test the template against
          # the PR under review, not against whatever's on crates.io
          # (or even before 0.4.0 ships at all). `[patch.crates-io]`
          # overrides the source: cargo resolves the version
          # constraint against the patched path's Cargo.toml, so
          # this works pre-publish.
          cat >> "$RUNNER_TEMP/$name/Cargo.toml" <<EOF

          [patch.crates-io]
          jackdaw = { path = "$checkout" }
          jackdaw_runtime = { path = "$checkout/crates/jackdaw_runtime" }
          EOF

      - name: Compile ${{ matrix.template }}
        # No `--locked`: cargo-generate doesn't ship a Cargo.lock,
        # and the patched jackdaw deps would mismatch one anyway.
        run: |
          set -euxo pipefail
          name="test_$(echo "${{ matrix.template }}" | tr - _)"
          cd "$RUNNER_TEMP/$name"
          cargo check --all-targets

      - name: Test ${{ matrix.template }} with editor feature
        # Game-static ships a smoke test that exercises the
        # editor's component picker against the project's own
        # `MyGamePlugin`. Skip for templates without a `tests/`
        # directory.
        run: |
          set -euxo pipefail
          name="test_$(echo "${{ matrix.template }}" | tr - _)"
          cd "$RUNNER_TEMP/$name"
          if [[ -d tests ]]; then
            cargo test --features editor
          else
            echo "no tests/ directory in scaffolded ${{ matrix.template }}; skipping"
          fi

  # Run clippy lints.
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: clippy, rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          shared-key: lints

      - name: Run clippy lints
        run: cargo clippy --locked --workspace --all-targets -- --deny warnings

  # Check formatting.
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: ${{ env.toolchain }}

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  # Check documentation.
  doc:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview
          toolchain: ${{ env.toolchain }}

      - name: Set LD_LIBRARY_PATH
        run: echo "LD_LIBRARY_PATH=$(rustc --print target-libdir)" >> $GITHUB_ENV

      - name: Activate CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          shared-key: lints

      - name: Check documentation
        run: cargo doc --locked --workspace --document-private-items --no-deps

  # Run Bevy lints.
  bevy-lint:
    name: Bevy linter
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustc-codegen-cranelift-preview, rustc-dev, llvm-tools-preview
          toolchain: ${{ env.toolchain }}

      - name: Install dependencies
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          shared-key: lints

      - name: Install Bevy linter
        run: cargo install --git https://github.com/TheBevyFlock/bevy_cli --locked bevy_lint

      - name: Add cranelift to rustc
        run: rustup component add rustc-codegen-cranelift-preview --toolchain ${{ env.toolchain }}

      - name: Active CI cargo config
        run: mv .cargo/config_ci.toml .cargo/config.toml

      - name: Install cargo binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Wild
        run: cargo binstall wild-linker --locked --force

      - name: Run Bevy linter
        run: bevy_lint --locked --workspace --all-targets
