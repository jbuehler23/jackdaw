name: Template roundtrip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  toolchain: stable

jobs:
  roundtrip:
    name: ${{ matrix.kind }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        kind: [game, extension]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.toolchain }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev

      - name: Cache rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install bevy CLI
        run: cargo install --locked --git https://github.com/TheBevyFlock/bevy_cli bevy_cli

      - name: Build jackdaw launcher
        run: cargo build --release --bin jackdaw

      - name: Scaffold project (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          ./target/release/jackdaw project.new '{
            "path":"/tmp",
            "name":"ci_${{ matrix.kind }}",
            "kind":"${{ matrix.kind }}"
          }'

      - name: Scaffold project (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tmp = "$env:RUNNER_TEMP"
          $name = "ci_${{ matrix.kind }}"
          $json = "{`"path`":`"$tmp`",`"name`":`"$name`",`"kind`":`"${{ matrix.kind }}`"}"
          ./target/release/jackdaw.exe project.new $json

      - name: Build project (Linux/macOS)
        if: matrix.os != 'windows-latest'
        working-directory: /tmp/ci_${{ matrix.kind }}
        run: cargo build

      - name: Build project (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: ${{ env.RUNNER_TEMP }}/ci_${{ matrix.kind }}
        run: cargo build
