name: Template roundtrip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  toolchain: nightly-2026-03-05

jobs:
  # Drive the editor's `project.new` operator via the CLI for each
  # template variant, then `cargo build` the resulting project. This
  # is the integration smoke that catches "templates compile against
  # the editor sources currently on this branch" — without it,
  # template breakage only surfaces when a user actually scaffolds
  # one.
  roundtrip:
    name: ${{ matrix.kind }} (${{ matrix.linkage }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kind: [game, extension]
        linkage: [static, dylib]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.toolchain }}

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev

      - name: Install bevy CLI
        run: cargo install --locked --git https://github.com/TheBevyFlock/bevy_cli bevy_cli

      - name: Populate target directory from cache
        uses: Swatinem/rust-cache@v2

      - name: Build jackdaw
        run: cargo build --release --bin jackdaw

      - name: Scaffold project via project.new
        run: |
          ./target/release/jackdaw project.new '{
            "path": "/tmp",
            "name": "ci_${{ matrix.kind }}_${{ matrix.linkage }}",
            "kind": "${{ matrix.kind }}",
            "linkage": "${{ matrix.linkage }}"
          }'

      - name: Verify project compiles
        run: |
          cd /tmp/ci_${{ matrix.kind }}_${{ matrix.linkage }}
          cargo build
